# This workflow will generate the docs on each push, and publish them on GitHub Pages if the branch is the main one.
name: main

on: [push]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for full commit history
          persist-credentials: false

      - name: Restore file modification times
        uses: chetan/git-restore-mtime-action@v2

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"

      - name: Set up Lilypond
        uses: codello/setup-lilypond@main
        with:
          lilypond-version: 2.24

      - name: Set up venv
        run: |
          uv sync

      - name: Compile files
        run: |
          uv run deploy.py

      - name: Deploy Sphinx documentation on Github Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/master'
        with:
          BRANCH: gh-pages
          FOLDER: build/
          SINGLE-COMMIT: true
